<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cost Calculator</title>
    <link rel="shortcut icon" href="./images/budget.png" type="image/x-icon" />
  </head>
  <body>
    <section>
      <h2>Insert Ingredients</h2>
      <div class="ing-cards-container">
        <template class="ingredient-card-template">
          <div class="ingredient-card">
            <div class="ing-name-actions-container">
              <h3 class="card-ing-name">Name</h3>
              <div class="buttons">
                <button class="edit-ing-btn">Edit</button>
                <button class="del-ing-btn">Delete</button>
              </div>
            </div>
            <div class="ing-info-container">
              <p class="card-ing-unit">Unit: 1kg</p>
              <p class="card-ing-price">Cost: 24mxn</p>
            </div>
          </div>
        </template>
        <div class="ingredient-card">
          <div class="ing-name-actions-container">
            <h3>Name</h3>
            <div class="buttons">
              <button class="edit-ing-btn">Edit</button>
              <button class="del-ing-btn">Delete</button>
            </div>
          </div>
          <div class="ing-info-container">
            <p>Unit: 1kg</p>
            <p>Cost: 24mxn</p>
          </div>
        </div>
      </div>
      <form class="ingredient-form">
        <div class="form-group">
          <label for="ing-name">Ingredient Name:</label>
          <input type="text" id="ing-name" class="ing-name" />
        </div>

        <div class="used-quantity-wrapper">
          <div class="form-group">
            <label for="ing-quantity">Quantity:</label>
            <input
              type="number"
              id="ing-quantity"
              placeholder="1"
              class="ing-quantity"
            />
          </div>

          <div class="form-group">
            <label for="ing-unit">Unit: </label>
            <select id="ing-unit" class="ing-unit">
              <option value="grams">g</option>
              <option value="kilograms" selected>kg</option>
              <option value="liters">lt</option>
              <option value="milliliters">ml</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="ing-price"> Price: </label>
          <input type="number" id="ing-price" class="ing-price" />
        </div>
        <button type="button" class="add-ing-btn">Add Ingredient</button>
      </form>
    </section>

    <section>
      <div class="recipe-cards-container">
        <template class="recipe-card-template">
          <div class="recipe-card">
            <div class="recipe-card-info">
              <p class="card-recipe-name">Pastel de Naranja</p>
              <p class="card-recipe-price">50 MXN</p>
            </div>
            <details class="ing-list-container">
              <summary><span>Ingredients</span></summary>
              <ul class="ing-card-list"></ul>
            </details>
            <div class="buttons">
              <button>PDF</button>
              <button>Edit</button>
              <button>Delete</button>
            </div>
          </div>
        </template>
        <div class="recipe-card">
          <div class="recipe-card-info">
            <p class="card-recipe-name">Pastel de Naranja</p>
            <p class="card-recipe-price">50 MXN</p>
          </div>
          <details class="ing-list-container">
            <summary><span>Ingredients</span></summary>
            <ul class="ing-card-list"></ul>
          </details>
          <div class="buttons">
            <button>PDF</button>
            <button>Edit</button>
            <button>Delete</button>
          </div>
        </div>
      </div>

      <h2>Insert Recipe</h2>
      <form class="recipe-form">
        <div class="form-group">
          <label for="recipe-name">Recipe Name:</label>
          <input type="text" id="recipe-name" class="recipe-name" />
        </div>

        <ul class="ing-min-cards-container">
          <template class="ing-min-card-template">
            <li class="ing-min-card">
              <p class="min-card-name">Harina</p>
              <div class="ing-min-details">
                <p class="min-card-unit">150g</p>
                <p class="min-card-price">50 MXN</p>
              </div>
            </li>
          </template>
        </ul>

        <fieldset class="ing-used-section">
          <legend>Add ingredient to recipe:</legend>
          <div class="form-group">
            <label for="select-ingredient">Select an ingredient:</label>
            <select id="select-ingredient" class="select-ingredient"></select>
          </div>
          <div class="used-quantity-wrapper">
            <div class="form-group">
              <label for="recipe-ing-quantity"> Quantity Used:</label>
              <input
                type="number"
                id="recipe-ing-quantity"
                class="recipe-ing-quantity"
              />
            </div>

            <div class="form-group">
              <label for="ing-unit-used">Unit:</label>
              <select id="ing-unit-used" class="ing-unit-used">
                <option value="grams" selected>g</option>
                <option value="kilograms">kg</option>
                <option value="liters">lt</option>
                <option value="milliliters">ml</option>
              </select>
            </div>
          </div>
          <button type="button" class="add-ing-recipe-btn">
            Add Ingredient
          </button>
        </fieldset>

        <button type="button" class="add-recipe-btn">Add Recipe</button>
      </form>
    </section>
  </body>
</html>
