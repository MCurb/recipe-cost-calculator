<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Recetas</title>
    <link rel="shortcut icon" href="./favicon/budget.png" type="image/x-icon" />
  </head>
  <body>
    <section>
      <div class="ing-cards-container">
        <!-- Ingredient Card Template -->
        <template class="ingredient-card-template">
          <div class="ingredient-card">
            <div class="ing-name-actions-container">
              <h3 class="card-ing-name">Nombre</h3>
              <div class="buttons">
                <button class="edit-ing-btn">Editar</button>
                <button class="del-ing-btn">Borrar</button>
              </div>
            </div>
            <div class="ing-info-container">
              <p class="card-ing-unit">1 kilogramo</p>
              <p class="card-ing-price">Costo: 24mxn</p>
            </div>
          </div>
        </template>
      </div>
      <h2>Añadir Ingrediente</h2>
      <form class="ingredient-form">
        <div class="form-group">
          <label for="ing-name">Nombre del Ingrediente</label>
          <input type="text" id="ing-name" class="ing-name" />
        </div>

        <div class="used-quantity-wrapper">
          <div class="form-group">
            <label for="ing-quantity">Cantidad Adquirida</label>
            <input
              type="number"
              id="ing-quantity"
              placeholder="1"
              class="ing-quantity"
            />
          </div>

          <div class="form-group">
            <label for="ing-unit">Unidad</label>
            <select id="ing-unit" class="ing-unit" required>
              <option value="">Selecciona una unidad</option>
              <optgroup label="Unidades Individuales">
                <option value="pieces">Unidad/Pieza</option>
              </optgroup>
              <optgroup label="Unidades de Masa">
                <option value="kilograms" selected>Kilogramo (kg)</option>
                <option value="grams">Gramo (g)</option>
                <option value="milligrams">Miligramo (mg)</option>
                <option value="pounds">Libra (lb)</option>
              </optgroup>
              <optgroup label="Unidades de Volumen">
                <option value="liters">Litro (l)</option>
                <option value="milliliters">Mililitro (ml)</option>
                <option value="tablespoons">Cucharada (tbsp)</option>
                <option value="teaspoons">Cucharadita (tsp)</option>
                <option value="cups">Taza (cup)</option>
                <option value="ounces">Onza (oz)</option>
              </optgroup>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="ing-price">Precio</label>
          <input type="number" id="ing-price" class="ing-price" />
        </div>
        <div class="ing-form-actions">
          <button type="submit" class="add-ing-btn">Añadir Ingrediente</button>
        </div>
      </form>
    </section>

    <section>
      <div class="recipe-cards-container">
        <!-- Recipe Card Template -->
        <template class="recipe-card-template">
          <div class="recipe-card">
            <div class="recipe-card-info">
              <p class="card-recipe-name">Pastel de Naranja</p>
              <p class="card-recipe-price">50 MXN</p>
            </div>
            <details class="ing-list-container">
              <summary><span>Ingredientes</span></summary>
              <ul class="ing-card-list"></ul>
            </details>
            <div class="buttons">
              <button class="pdf-recipe-btn">PDF</button>
              <button class="edit-recipe-btn">Editar</button>
              <button class="del-recipe-btn">Borrar</button>
            </div>
          </div>
        </template>
      </div>

      <h2>Añadir Receta</h2>
      <form class="recipe-form">
        <div class="form-group">
          <label for="recipe-name">Nombre de la Receta</label>
          <input type="text" id="recipe-name" class="recipe-name" />
        </div>

        <ul class="ing-min-cards-container">
          <!-- Ingredient Minimal Card Template -->
          <template class="ing-min-card-template">
            <li class="ing-min-card">
              <p class="min-card-name">Harina</p>
              <div class="ing-min-details">
                <p class="min-card-unit">150g</p>
                <p class="min-card-price">50 MXN</p>
              </div>
              <div class="ing-min-actions">
                <button type="button" class="min-card-edit-btn">Editar</button>
                <button type="button" class="min-card-del-btn">Borrar</button>
              </div>
            </li>
          </template>
        </ul>

        <fieldset class="ing-used-section">
          <legend>Añadir ingrediente a la receta</legend>
          <div class="form-group">
            <label for="select-ingredient">Seleccionar Ingrediente</label>
            <select id="select-ingredient" class="select-ingredient"></select>
          </div>
          <div class="used-quantity-wrapper">
            <div class="form-group">
              <label for="recipe-ing-quantity">Cantidad Usada</label>
              <input
                type="number"
                id="recipe-ing-quantity"
                class="recipe-ing-quantity"
              />
            </div>

            <div class="form-group">
              <label for="ing-unit-used">Unidad</label>
              <select id="ing-unit-used" class="ing-unit-used">
                <option value="">Selecciona una unidad</option>
                <optgroup label="Unidades Individuales">
                  <option value="pieces">Unidad/Pieza</option>
                </optgroup>
                <optgroup label="Unidades de Masa">
                  <option value="kilograms" selected>Kilogramo (kg)</option>
                  <option value="grams">Gramo (g)</option>
                  <option value="milligrams">Miligramo (mg)</option>
                  <option value="pounds">Libra (lb)</option>
                </optgroup>
                <optgroup label="Unidades de Volumen">
                  <option value="liters">Litro (l)</option>
                  <option value="milliliters">Mililitro (ml)</option>
                  <option value="tablespoons">Cucharada (tbsp)</option>
                  <option value="teaspoons">Cucharadita (tsp)</option>
                  <option value="cups">Taza (cup)</option>
                  <option value="ounces">Onza (oz)</option>
                </optgroup>
              </select>
            </div>
          </div>
          <button class="add-ing-recipe-btn">Añadir Ingrediente</button>
        </fieldset>
        <div class="recipe-form-actions">
          <button type="button" class="add-recipe-btn">Añadir Receta</button>
        </div>
      </form>
    </section>
  </body>
</html>
